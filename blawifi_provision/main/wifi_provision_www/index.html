<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico">
  <title>blawifi setup</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 1em auto; padding: 0 1em; }
    label { display: block; margin-top: 0.6em; font-size: 0.9em; }
    input { width: 100%; padding: 0.4em; box-sizing: border-box; font-size: 1em; }
    button { margin-top: 1em; padding: 0.6em 1.2em; font-size: 1em; }
    fieldset { margin-top: 1em; }
  </style>
</head>
<body>
  <h1><img src="/favicon.ico"/>blawifi setup</h1>
  <form method="POST" action="/save">
    <label>Device name <input name="this_device_name" required></label>
    <fieldset>
      <legend>Wi-Fi</legend>
      <label>SSID <input name="ap_name" required></label>
      <label>Password <input name="ap_pwd" type="password"></label>
    </fieldset>
    <fieldset>
      <legend>MQTT</legend>
      <label>URL <input name="mqtt_url" placeholder="mqtt://broker.example.com:1883"></label>
      <label>Username <input name="mqtt_usr"></label>
      <label>Password <input name="mqtt_pwd" type="password"></label>
    </fieldset>
    <button type="submit">Save</button>
  </form>
</body>
</html>
